# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"
  activerecord:
    errors:
      models:
        combo:
          attributes:
            name:
              blank: "can't be blank"
              too_long: "is too long (maximum 100 characters)"
            description:
              too_long: "is too long (maximum 255 characters)"
            price:
              blank: "can't be blank"
              not_a_number: "is not a valid number"
              greater_than_or_equal_to: "must be greater than or equal to 0"
              less_than_or_equal_to: "must be less than or equal to 9999.99"
            image:
              file_size_too_large: "must be less than 5 MB"
              invalid_content_type: "must be a JPEG or PNG image"
        availability:
          attributes:
            start_at:
              in_past: "must be in the future"
        combo_item:
          attributes:
            quantity:
              blank: "can't be blank"
              not_a_number: "is not a valid number"
              not_an_integer: "must be an integer"
              greater_than_or_equal_to: "must be greater than or equal to 1"
              less_than_or_equal_to: "must be less than or equal to 10"
            combo_id:
              taken: "already exists in this combo"
            combo:
              required: "must exist"
            item:
              required: "must exist"
    attributes:
      combo:
        name: "Name"
        description: "Description"
        price: "Price"
        image: "Image"
      combo_item:
