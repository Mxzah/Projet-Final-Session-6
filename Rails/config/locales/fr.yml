          has_many: "Impossible de supprimer l'enregistrement car des %{record} dépendants existent"
      models:
        combo:
          attributes:
            name:
              blank: "ne peut pas être vide"
              too_long: "est trop long (maximum 100 caractères)"
            description:
              too_long: "est trop longue (maximum 255 caractères)"
