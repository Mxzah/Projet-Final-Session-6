              only_spaces: "ne peut pas être composé uniquement d'espaces"
        item:
          attributes:
            image:
              required: "est requis"
              invalid_format: "doit être un fichier JPG ou PNG"
              file_too_large: "doit être inférieur à 5 Mo"
            deleted_at:
              must_be_now: "doit être l'heure actuelle"
            name:
              only_whitespace: "ne peut pas être composé uniquement d'espaces"
