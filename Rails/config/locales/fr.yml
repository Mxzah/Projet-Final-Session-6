              overlapping: "cette période chevauche une période existante"
            description:
              only_spaces: "ne peut pas être composé uniquement d'espaces"
        combo_item:
          attributes:
            quantity:
              blank: "ne peut pas être vide"
              not_a_number: "n'est pas un nombre valide"
              not_an_integer: "doit être un nombre entier"
              greater_than_or_equal_to: "doit être supérieur ou égal à 1"
              less_than_or_equal_to: "doit être inférieur ou égal à 10"
            combo_id:
              taken: "existe déjà dans ce combo"
            combo:
              required: "doit exister"
            item:
              required: "doit exister"
    # Noms des modèles
    models:
      combo:
        one: "Combo"
        other: "Combos"
      combo_item:
        one: "Article du combo"
        other: "Articles du combo"
    # Noms des attributs
    attributes:
